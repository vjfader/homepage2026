<script src="/js/load-photoswipe.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var contactForms = document.querySelectorAll('form[name="contact"]');

    contactForms.forEach(function (form) {
      var warning = form.querySelector('[data-contact-form-warning]');

      form.addEventListener('submit', function (event) {
        var recaptchaResponse = form.querySelector('textarea[name="g-recaptcha-response"]');
        var hasCaptcha = recaptchaResponse && recaptchaResponse.value.trim().length > 0;

        if (!hasCaptcha) {
          event.preventDefault();

          if (warning) {
            warning.hidden = false;
          }
        }
      });

      form.addEventListener('input', function () {
        if (warning) {
          warning.hidden = true;
        }
      });
    });
  });
</script>
{{ if not hugo.IsServer }}
<script>
    if('serviceWorker' in navigator) {
        navigator.serviceWorker
            .register('/sw.js', { scope: '/' })
            .then(function(registration) {
                console.log('Service Worker Registered');
            });

        navigator.serviceWorker
            .ready
            .then(function(registration) {
                console.log('Service Worker Ready');
            });
    }
</script>
{{ end }}
